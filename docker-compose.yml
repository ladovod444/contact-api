services:
    php_contact:
        build:
            context: php_contact
        volumes:
            - .:/var/www/symfony
            - ./docker-php.ini:/usr/local/etc/php/conf.d/docker-php.ini:ro
        environment:
            PHP_IDE_CONFIG: serverName=localhost
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - symfony_contact
        depends_on:
            - dbcon

    dbcon:
        image: postgres:16-alpine
        restart: always
        environment:
            POSTGRES_DB: symfony_db
            POSTGRES_USER: symfony_user
            POSTGRES_PASSWORD: symfony_password
        ports:
            - "5438:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - symfony_contact

    nginx_contact:
        image: nginx:alpine
        ports:
            - "8090:80"
        volumes:
            - .:/var/www/symfony
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - symfony_contact
        depends_on:
            - php_contact

volumes:
    db_data:

networks:
    symfony_contact:
        driver: bridge
